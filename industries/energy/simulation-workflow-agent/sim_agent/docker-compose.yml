# Sim agent + Milvus. Optional OCR for manual ingestion (--profile ocr).
#
# Usage:
#   docker compose up -d                    # sim-agent + Milvus only
#   docker compose --profile ocr up -d      # + ocr-vllm (GPU, for PDF→OCR→Milvus)
#
# OCR endpoint: http://localhost:8080/v1 (host) or http://ocr-vllm:8080/v1 (from containers).

services:
  sim-agent:
    build:
      context: ..
      dockerfile: sim_agent/Dockerfile
    image: sim-agent:cpu
    container_name: sim-agent
    command: /bin/bash
    tty: true
    stdin_open: true
    ports:
      - "5679:5678"  # debugpy
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      MILVUS_URI: http://standalone:19530
      OPM_PROJECT_ROOT: /workspace/sim_agent
      OPM_FLOW_EXTRA_ARGS: "--CheckSatfuncConsistency=0"
      OCR_VLLM_URLS: http://ocr-vllm:8080/v1
    volumes:
      - ..:/workspace
    working_dir: /workspace/sim_agent
    depends_on:
      - standalone

  ocr-vllm:
    image: glm-ocr-vllm
    build:
      context: .
      dockerfile: Dockerfile.ocr
    command: ["zai-org/GLM-OCR", "--allowed-local-media-path", "/", "--port", "8080", "--max-model-len", "32768"]
    ports:
      - "8080:8080"
    volumes:
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    restart: unless-stopped
    profiles:
      - ocr

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

networks:
  default:
    name: milvus
